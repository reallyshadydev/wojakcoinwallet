# Build Android debug APK and upload as a workflow artifact.
# Does NOT create a GitHub Release — install the APK from the Actions run page after tests pass.
#
# Triggers: push to main, or manual (workflow_dispatch).

name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      actions: write # upload-artifact

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web (Next.js static export)
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wojakcoinwallet-android-debug-${{ github.run_number }}-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Summary
        run: |
          echo "### Android build (artifact only — no release)" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **app-debug.apk** from this job's **Artifacts** section." >> "$GITHUB_STEP_SUMMARY"
          echo "SHA: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
